<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusVoice</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:
    linear-gradient(
      135deg,
      #0f172a,
      #111827,
      #1e293b
    );

  color:#f8fafc;
  min-height:100vh;
}

/* PAGE */

.page{
  display:none;
}

.page.active{
  display:block;
}

/* AUTH */

.auth-wrap{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:25px;
}

.auth-card{
  width:100%;
  max-width:430px;

  background:rgba(30,41,59,0.75);

  backdrop-filter:blur(16px);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:28px;

  padding:35px;

  box-shadow:
    0 15px 45px rgba(0,0,0,0.35);
}

.auth-title{
  font-size:40px;
  font-weight:700;

  margin-bottom:10px;

  background:
    linear-gradient(
      to right,
      #60a5fa,
      #38bdf8
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.auth-sub{
  color:#94a3b8;
  margin-bottom:28px;
  font-size:14px;
}

/* FORM */

.field{
  margin-bottom:18px;
}

.field label{
  display:block;
  margin-bottom:8px;
  color:#cbd5e1;
  font-size:14px;
}

input,
textarea,
select{
  width:100%;
  padding:14px;

  border:none;

  border-radius:14px;

  background:#1e293b;

  border:1px solid rgba(255,255,255,0.05);

  color:white;

  outline:none;

  transition:0.2s ease;
}

input:focus,
textarea:focus,
select:focus{
  border-color:#3b82f6;

  box-shadow:
    0 0 0 4px rgba(59,130,246,0.15);
}

textarea{
  resize:none;
}

/* BUTTONS */

.btn,
.submit-btn,
.back-btn,
.nav-logout{
  border:none;
  cursor:pointer;
  transition:0.25s ease;
  font-weight:600;
}

.btn,
.submit-btn{
  width:100%;
  padding:14px;

  border-radius:14px;

  background:
    linear-gradient(
      to right,
      #2563eb,
      #3b82f6
    );

  color:white;

  margin-top:10px;
}

.btn:hover,
.submit-btn:hover{
  transform:translateY(-2px);
}

.back-btn{
  padding:12px 18px;

  border-radius:12px;

  background:#334155;

  color:white;
}

.back-btn:hover{
  background:#475569;
}

.nav-logout{
  padding:12px 18px;

  border-radius:12px;

  background:#ef4444;

  color:white;
}

.nav-logout:hover{
  background:#dc2626;
}

/* DASHBOARD */

.dashboard-container{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

nav{
  width:270px;

  background:
    rgba(15,23,42,0.95);

  border-right:
    1px solid rgba(255,255,255,0.05);

  padding:30px 22px;

  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.nav-left{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.nav-left h2{
  color:#60a5fa;
  font-size:26px;
}

/* CONTENT */

.dashboard-wrap{
  flex:1;
  padding:35px;
}

/* CARD */

.card{
  background:
    rgba(30,41,59,0.75);

  backdrop-filter:blur(12px);

  border:
    1px solid rgba(255,255,255,0.05);

  border-radius:26px;

  padding:28px;

  margin-bottom:25px;

  box-shadow:
    0 10px 35px rgba(0,0,0,0.25);
}

.folder-title{
  color:#93c5fd;
  font-size:24px;
  margin-bottom:25px;
}

/* STATS */

.stats-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:20px;
}

.stat-number{
  font-size:42px;
  font-weight:700;
  margin-top:10px;
  color:#60a5fa;
}

/* FEEDBACK */

.item-box{
  background:#243244;

  border:
    1px solid rgba(255,255,255,0.04);

  padding:20px;

  border-radius:20px;

  margin-top:18px;

  transition:0.2s ease;
}

.item-box:hover{
  transform:translateY(-2px);
  background:#2f4158;
}

.small-text{
  color:#94a3b8;
  font-size:13px;
}

/* STATUS */

.status-badge{
  display:inline-block;

  padding:7px 14px;

  border-radius:999px;

  font-size:12px;

  font-weight:700;

  margin-top:12px;
}

.pending{
  background:rgba(250,204,21,0.12);
  color:#fde047;
}

.reviewed{
  background:rgba(56,189,248,0.12);
  color:#38bdf8;
}

.complete{
  background:rgba(34,197,94,0.12);
  color:#4ade80;
}

/* PROFILE */

.profile-card{
  max-width:850px;
  margin:auto;
}

.profile-header{
  display:flex;
  align-items:center;
  gap:25px;
  flex-wrap:wrap;
}

.profile-avatar{
  width:100px;
  height:100px;

  border-radius:50%;

  background:
    linear-gradient(
      to right,
      #2563eb,
      #38bdf8
    );

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:38px;
  font-weight:700;

  box-shadow:
    0 10px 25px rgba(37,99,235,0.3);
}

.profile-info h2{
  font-size:30px;
  margin-bottom:8px;
}

.profile-info p{
  color:#cbd5e1;
  margin-bottom:6px;
}

.profile-section{
  margin-top:28px;

  background:#1e293b;

  border-radius:18px;

  padding:22px;
}

.profile-section h3{
  margin-bottom:16px;
  color:#93c5fd;
}

/* DIVIDER */

.blue-line{
  width:60px;
  height:4px;

  border-radius:999px;

  background:#3b82f6;

  margin:
    12px 0 18px;
}

/* RESPONSIVE */

@media(max-width:900px){

  .dashboard-container{
    flex-direction:column;
  }

  nav{
    width:100%;
    flex-direction:row;
    align-items:center;
  }

  .nav-left{
    flex-direction:row;
    align-items:center;
    flex-wrap:wrap;
  }

  .dashboard-wrap{
    padding:20px;
  }
}

</style>

</head>

<body>

<div id="page-auth" class="page active">

  <div class="auth-wrap">

    <div class="auth-card">

      <div class="auth-title">
        CampusVoice
      </div>

      <div class="auth-sub">
        Feedback & Suggestion Management System
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="auth-email">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="auth-password">
      </div>

      <button class="btn" onclick="doLogin()">
        Sign In
      </button>

      <button
        class="btn"
        style="background:#334155;"
        onclick="showRegister()"
      >
        Create Account
      </button>

    </div>

  </div>

</div>

<script>

let users =
  JSON.parse(localStorage.getItem("campusUsers")) || [];

let feedbackList =
  JSON.parse(localStorage.getItem("feedbackList")) || [];

let suggestionList =
  JSON.parse(localStorage.getItem("suggestionList")) || [];

let currentUser = null;

const ADMIN_EMAILS = [
  "bsherenjoy@gmail.com",
  "andreafayebaldemoro@gmail.com",
  "rempisgil@gmail.com",
  "salabercheriza@gmail.com"
];

function isAdmin(email){
  return ADMIN_EMAILS.includes(email.toLowerCase());
}

function showRegister(){

  document.getElementById("page-auth").innerHTML = `

    <div class="auth-wrap">

      <div class="auth-card">

        <div class="auth-title">
          Create Account
        </div>

        <div class="auth-sub">
          Register your school account
        </div>

        <div class="field">
          <label>Full Name</label>
          <input type="text" id="register-name">
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="register-email">
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="register-password">
        </div>

        <div class="field" id="id-field">
          <label>ID Number</label>
          <input type="text" id="register-id">
        </div>

        <div class="field">

          <label>Select Role</label>

          <select id="register-role" onchange="toggleIDField()">

            <option value="student">
              Student
            </option>

            <option value="faculty">
              Faculty
            </option>

            <option value="staff">
              Staff
            </option>

          </select>

        </div>

        <button class="btn" onclick="createAccount()">
          Register Account
        </button>

        <button
          class="btn"
          style="background:#334155;"
          onclick="location.reload()"
        >
          Back to Login
        </button>

      </div>

    </div>
  `;
}

function toggleIDField(){

  const role =
    document.getElementById("register-role").value;

  document.getElementById("id-field").style.display =
    role === "staff"
    ? "none"
    : "block";
}

function createAccount(){

  const name =
    document.getElementById("register-name").value.trim();

  const email =
    document.getElementById("register-email")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("register-password").value;

  const idNumber =
    document.getElementById("register-id").value.trim();

  const roleSelected =
    document.getElementById("register-role").value;

  if(!name || !email || !password){
    return alert("Please complete all fields.");
  }

  if(roleSelected !== "staff" && !idNumber){
    return alert("ID Number required.");
  }

  const finalRole =
    isAdmin(email)
    ? "administrator"
    : roleSelected;

  if(users.find(u => u.email === email)){
    return alert("Account already exists.");
  }

  users.push({
    name,
    email,
    password,
    role:finalRole,
    idNumber,
    createdAt:new Date().toLocaleString()
  });

  localStorage.setItem(
    "campusUsers",
    JSON.stringify(users)
  );

  alert("Account created!");

  location.reload();
}

function doLogin(){

  const email =
    document.getElementById("auth-email")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("auth-password").value;

  const foundUser =
    users.find(
      u =>
      u.email === email &&
      u.password === password
    );

  if(!foundUser){
    return alert("Invalid email or password.");
  }

  if(isAdmin(foundUser.email)){
    foundUser.role = "administrator";
  }

  currentUser = foundUser;

  loadDashboard();
}

function loadDashboard(){

  document.getElementById("page-auth").style.display =
    "none";

  document.querySelectorAll(".dashboard-container")
    .forEach(el => el.remove());

  const dashboard =
    document.createElement("div");

  dashboard.className = "dashboard-container";

  if(currentUser.role === "administrator"){

    dashboard.innerHTML = `

      <nav>

        <div class="nav-left">

          <h2>
            CampusVoice Admin
          </h2>

          <button
            class="back-btn"
            onclick="openProfilePage()"
          >
            Profile
          </button>

        </div>

        <button
          class="nav-logout"
          onclick="logout()"
        >
          Logout
        </button>

      </nav>

      <div class="dashboard-wrap">

        <div class="stats-grid">

          <div class="card">

            <h3>Total Feedbacks</h3>

            <div class="stat-number">
              ${feedbackList.length}
            </div>

          </div>

          <div class="card">

            <h3>Total Suggestions</h3>

            <div class="stat-number">
              ${suggestionList.length}
            </div>

          </div>

          <div class="card">

            <h3>Total Users</h3>

            <div class="stat-number">
              ${users.length}
            </div>

          </div>

        </div>

        <div class="card">

          <h2 class="folder-title">
            All User Feedbacks
          </h2>

          ${generateAllAdminFeedbacks()}

        </div>

      </div>
    `;

  } else {

    dashboard.innerHTML = `

      <nav>

        <div class="nav-left">

          <h2>
            Welcome, ${currentUser.name}
          </h2>

          <button
            class="back-btn"
            onclick="openProfilePage()"
          >
            Profile
          </button>

        </div>

        <button
          class="nav-logout"
          onclick="logout()"
        >
          Logout
        </button>

      </nav>

      <div class="dashboard-wrap">

        <div class="card">

          <h2>
            Feedback & Suggestion Form
          </h2>

          <div class="blue-line"></div>

          <div class="field">

            <label>Feedback Title</label>

            <input type="text" id="fb-title">

          </div>

          <div class="field">

            <label>Feedback Message</label>

            <textarea
              id="fb-message"
              rows="4"
            ></textarea>

          </div>

          <div class="field">

            <label>Suggestion</label>

            <textarea
              id="sg-text"
              rows="4"
            ></textarea>

          </div>

          <button
            class="submit-btn"
            onclick="submitCombined('${currentUser.email}')"
          >
            Submit Response
          </button>

        </div>

        <div class="card">

          <h2>
            Your Submitted Feedbacks
          </h2>

          <div class="blue-line"></div>

          ${generateUserResponses(currentUser.email)}

        </div>

      </div>
    `;
  }

  document.body.appendChild(dashboard);
}

function generateAllAdminFeedbacks(){

  if(feedbackList.length === 0){
    return "<p>No feedbacks submitted yet.</p>";
  }

  return feedbackList.map((f,index) => {

    const sender =
      users.find(u => u.email === f.user);

    const relatedSuggestions =
      suggestionList.filter(
        s => s.user === f.user
      );

    return `

      <div class="item-box">

        <h3 style="
          font-size:22px;
          margin-bottom:10px;
        ">
          ${f.title}
        </h3>

        <div class="blue-line"></div>

        <b>Full Feedback:</b>

        <br><br>

        ${f.message}

        <br><br>

        <b>Suggestions:</b>

        <br><br>

        ${
          relatedSuggestions.length > 0

          ? relatedSuggestions.map(s => `

              <div class="item-box">
                ${s.text}
              </div>

            `).join("")

          : "No suggestions submitted."
        }

        <br><br>

        <span class="small-text">
          Sender:
          ${sender ? sender.name : "Unknown"}
        </span>

        <br>

        <span class="small-text">
          Role:
          ${sender ? sender.role.toUpperCase() : "UNKNOWN"}
        </span>

        <br>

        <span class="small-text">
          Email:
          ${f.user}
        </span>

        <br>

        <span class="small-text">
          Submitted:
          ${f.time}
        </span>

        <br><br>

        <label>Status</label>

        <select
          onchange="updateFeedbackStatus(${index},this.value)"
        >

          <option
            value="Pending"
            ${f.status === "Pending" ? "selected" : ""}
          >
            Pending
          </option>

          <option
            value="Reviewed"
            ${f.status === "Reviewed" ? "selected" : ""}
          >
            Reviewed
          </option>

          <option
            value="Complete"
            ${f.status === "Complete" ? "selected" : ""}
          >
            Complete
          </option>

        </select>

      </div>
    `;
  }).join("");
}

function generateUserResponses(email){

  let items = "";

  feedbackList
    .filter(f => f.user === email)
    .forEach(f => {

      let statusClass = "pending";

      if(f.status === "Reviewed"){
        statusClass = "reviewed";
      }

      if(f.status === "Complete"){
        statusClass = "complete";
      }

      items += `

        <div class="item-box">

          <h3>
            ${f.title}
          </h3>

          <div class="blue-line"></div>

          ${f.message}

          <br><br>

          <div class="status-badge ${statusClass}">
            ${f.status}
          </div>

        </div>
      `;
    });

  return items || "No feedbacks submitted yet.";
}

function openProfilePage(){

  document.querySelectorAll(".dashboard-container")
    .forEach(el => el.remove());

  const page =
    document.createElement("div");

  page.className = "dashboard-container";

  const userFeedbacks =
    feedbackList.filter(
      f => f.user === currentUser.email
    );

  const userSuggestions =
    suggestionList.filter(
      s => s.user === currentUser.email
    );

  page.innerHTML = `

    <nav>

      <div class="nav-left">

        <button
          class="back-btn"
          onclick="loadDashboard()"
        >
          ← Back
        </button>

        <h2>
          User Profile
        </h2>

      </div>

      <button
        class="nav-logout"
        onclick="logout()"
      >
        Logout
      </button>

    </nav>

    <div class="dashboard-wrap">

      <div class="card profile-card">

        <div class="profile-header">

          <div class="profile-avatar">
            ${currentUser.name.charAt(0).toUpperCase()}
          </div>

          <div class="profile-info">

            <h2>
              ${currentUser.name}
            </h2>

            <p>
              Role:
              ${currentUser.role.toUpperCase()}
            </p>

            <p>
              Email:
              ${currentUser.email}
            </p>

            <p>
              ${
                currentUser.idNumber
                ? `ID Number: ${currentUser.idNumber}`
                : "No ID Number"
              }
            </p>

            <p>
              Account Created:
              ${currentUser.createdAt || "N/A"}
            </p>

          </div>

        </div>

        <div class="profile-section">

          <h3>
            Submitted Feedbacks
          </h3>

          ${
            userFeedbacks.length > 0

            ? userFeedbacks.map(f => `

                <div class="item-box">

                  <h4>
                    ${f.title}
                  </h4>

                  <div class="blue-line"></div>

                  ${f.message}

                  <br><br>

                  <span class="small-text">
                    Status:
                    ${f.status}
                  </span>

                </div>

              `).join("")

            : "No feedbacks submitted yet."
          }

        </div>

        <div class="profile-section">

          <h3>
            Submitted Suggestions
          </h3>

          ${
            userSuggestions.length > 0

            ? userSuggestions.map(s => `

                <div class="item-box">

                  ${s.text}

                  <br><br>

                  <span class="small-text">
                    Submitted:
                    ${s.time}
                  </span>

                </div>

              `).join("")

            : "No suggestions submitted yet."
          }

        </div>

      </div>

    </div>
  `;

  document.body.appendChild(page);
}

function submitCombined(email){

  const title =
    document.getElementById("fb-title").value.trim();

  const message =
    document.getElementById("fb-message").value.trim();

  const suggestion =
    document.getElementById("sg-text").value.trim();

  if(!title && !message && !suggestion){
    return alert("Please fill at least one field.");
  }

  if(title || message){

    feedbackList.push({

      user:email,

      title,

      message,

      status:"Pending",

      time:new Date().toLocaleString()

    });

    localStorage.setItem(
      "feedbackList",
      JSON.stringify(feedbackList)
    );
  }

  if(suggestion){

    suggestionList.push({

      user:email,

      text:suggestion,

      time:new Date().toLocaleString()

    });

    localStorage.setItem(
      "suggestionList",
      JSON.stringify(suggestionList)
    );
  }

  alert("Submitted successfully!");

  loadDashboard();
}

function updateFeedbackStatus(index,newStatus){

  feedbackList[index].status = newStatus;

  localStorage.setItem(
    "feedbackList",
    JSON.stringify(feedbackList)
  );

  loadDashboard();
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
